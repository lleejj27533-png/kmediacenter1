<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>학습습관 검사</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Malgun Gothic','맑은 고딕',Apple SD Gothic Neo,sans-serif;background:#f1f5f9;color:#1e293b;overscroll-behavior:none}
:root{--cat:#4F46E5}
.screen{display:none;flex-direction:column;height:100dvh;height:100vh}
.screen.active{display:flex}

/* INTRO */
#intro{background:linear-gradient(160deg,#4F46E5 0%,#7C3AED 100%)}
.ib{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;gap:20px}
.ii{width:72px;height:72px;background:rgba(255,255,255,.18);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px}
.it{color:#fff;font-size:24px;font-weight:800;text-align:center}
.is{color:rgba(255,255,255,.8);font-size:13px;text-align:center;line-height:1.7;margin-top:-8px}
.ic{background:#fff;border-radius:18px;padding:22px 18px;width:100%;max-width:390px;display:flex;flex-direction:column;gap:12px}
.ic label{font-size:11px;font-weight:700;color:#64748b;display:block;margin-bottom:3px}
.ic input{width:100%;padding:11px 13px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:14px;font-family:inherit;color:#1e293b;outline:none}
.ic input:focus{border-color:#4F46E5}
.sb{width:100%;padding:14px;background:linear-gradient(135deg,#4F46E5,#7C3AED);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit}
.qc{color:rgba(255,255,255,.65);font-size:12px;text-align:center}

/* SURVEY */
#survey{background:#f1f5f9}
.sh{background:#fff;padding:12px 14px 9px;border-bottom:1px solid #e2e8f0;flex-shrink:0}
.sm{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cb{font-size:11px;font-weight:700;padding:3px 10px;border-radius:16px;color:#fff;background:var(--cat)}
.pn{font-size:11px;color:#94a3b8;font-weight:600}
.pt{height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .4s ease;background:var(--cat)}
.ss{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:11px}
.qc2{background:#fff;border-radius:14px;padding:16px 14px;border:2px solid #f1f5f9}
.qc2.ans{border-color:var(--cat)}
.qn{font-size:10px;font-weight:700;color:var(--cat);margin-bottom:5px;opacity:.8}
.qt{font-size:14px;color:#1e293b;line-height:1.6;margin-bottom:11px;font-weight:500}
.lk{display:flex;flex-direction:column;gap:4px}
.lb{width:100%;display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;border:1.5px solid #e2e8f0;background:#f8fafc;font-size:12px;color:#64748b;cursor:pointer;font-family:inherit;text-align:left;transition:all .15s;line-height:1.3}
.lb.sel{border-color:var(--cat);background:var(--cat);color:#fff;font-weight:700}
.lb:hover:not(.sel){background:#f0f4ff;border-color:#c7d2fe}
.rc{width:15px;height:15px;border-radius:50%;border:2px solid #cbd5e1;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.lb.sel .rc{border-color:rgba(255,255,255,.6)}
.rd{width:6px;height:6px;border-radius:50%;background:#fff;display:none}
.lb.sel .rd{display:block}
.sf{background:#fff;padding:12px 14px;border-top:1px solid #e2e8f0;display:flex;gap:8px;flex-shrink:0}
.nb{flex:1;padding:13px;border-radius:11px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.pvb{background:#f1f5f9;color:#64748b}
.nxb{color:#fff;background:var(--cat)}

/* RESULTS */
#results{background:#f1f5f9;overflow-y:auto}
.rh{background:linear-gradient(135deg,#4F46E5,#7C3AED);padding:22px 18px 20px;flex-shrink:0}
.rn{font-size:20px;font-weight:800;color:#fff;margin-bottom:2px}
.ri{font-size:12px;color:rgba(255,255,255,.75);margin-bottom:14px}
.rl{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;background:rgba(255,255,255,.2);border-radius:16px;font-size:12px;font-weight:700;color:#fff;margin-bottom:10px}
.tc{background:rgba(255,255,255,.15);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px}
.tn{font-size:36px;font-weight:900;color:#fff;line-height:1;flex-shrink:0}
.td{font-size:13px;color:rgba(255,255,255,.55)}
.tr2{flex:1}
.tl{font-size:12px;color:rgba(255,255,255,.8);margin-bottom:5px;font-weight:600}
.tt{height:8px;background:rgba(255,255,255,.2);border-radius:4px;overflow:hidden}
.tf{height:100%;background:#fff;border-radius:4px;transition:width 1s ease}
.tp{font-size:10px;color:rgba(255,255,255,.65);margin-top:3px}
.rb{padding:14px;display:flex;flex-direction:column;gap:10px}

/* CATEGORY CARD */
.cc{background:#fff;border-radius:14px;overflow:hidden}
.ch{padding:12px 14px 10px;display:flex;align-items:center;gap:10px}
.ci{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.cn{font-size:13px;font-weight:700;color:#1e293b}
.cr{font-size:10px;color:#94a3b8;margin-top:1px}
.lbdg{padding:2px 9px;border-radius:16px;font-size:10px;font-weight:800;margin-left:auto;flex-shrink:0}
.lx{background:#DCFCE7;color:#15803d}
.lg{background:#DBEAFE;color:#1d4ed8}
.lp{background:#FEF9C3;color:#92400e}
.lv{background:#FEE2E2;color:#b91c1c}
.csr{display:flex;align-items:center;gap:8px;padding:0 14px 12px}
.cbt{flex:1;height:8px;background:#f1f5f9;border-radius:4px;overflow:hidden}
.cbf{height:100%;border-radius:4px;transition:width 1.2s ease}
.cst{font-size:14px;font-weight:800;flex-shrink:0;min-width:40px;text-align:right}

/* FEEDBACK BOX */
.fb-wrap{background:#fff;border-radius:14px;overflow:hidden;margin:0 0 10px}
.fb-head{padding:14px 16px;border-bottom:1px solid #f1f5f9}
.fb-title{font-size:14px;font-weight:700;color:#1e293b;display:flex;align-items:center;gap:7px}
.fb-body{padding:14px 16px;display:flex;flex-direction:column;gap:12px}
.fb-section{font-size:13px;line-height:1.8;color:#334155}
.fb-label{font-size:11px;font-weight:700;color:#64748b;margin-bottom:5px;letter-spacing:.4px;text-transform:uppercase}
.fb-text{font-size:13px;line-height:1.8;color:#334155}
.fb-strong{background:#EEF2FF;border-left:3px solid #4F46E5;padding:10px 12px;border-radius:0 8px 8px 0;font-size:13px;color:#3730a3;line-height:1.7;margin:4px 0}
.fb-action{display:flex;gap:9px;align-items:flex-start;padding:8px 11px;background:#f8fafc;border-radius:8px;font-size:12px;color:#334155;line-height:1.5}
.fa-num{width:20px;height:20px;border-radius:50%;background:#4F46E5;color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.fb-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;margin:2px}
.tag-str{background:#DCFCE7;color:#15803d}
.tag-wk{background:#FEE2E2;color:#b91c1c}

/* ACTION BUTTONS */
.ra{padding:14px;display:flex;flex-direction:column;gap:8px}
.abt{width:100%;padding:14px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px}
.dl-btn{background:linear-gradient(135deg,#059669,#10b981);color:#fff}
.print-btn2{background:linear-gradient(135deg,#4F46E5,#7C3AED);color:#fff}
.retry-btn2{background:#f1f5f9;color:#64748b}
.abt:active{opacity:.88;transform:scale(.98)}

/* ADV (for categories) */
.adv{border-top:1px solid #f1f5f9;padding:12px 14px}
.adv-t{font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:6px}
.cause{background:#fef9c3;border-radius:8px;padding:8px 11px;margin-bottom:6px;font-size:11px;color:#78350f;line-height:1.6}
.imp-list{display:flex;flex-direction:column;gap:4px}
.imp-item{display:flex;align-items:flex-start;gap:7px;padding:7px 9px;background:#f0fdf4;border-radius:7px;font-size:11px;color:#15803d;line-height:1.5}
.imp-dot{width:16px;height:16px;border-radius:50%;background:#22c55e;color:#fff;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}

/* TOAST */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;transition:opacity .3s;opacity:0;pointer-events:none}
#toast.show{opacity:1}

@media print{
  .screen{display:none!important}
  #results{display:block!important;height:auto!important;overflow:visible!important}
  .ra{display:none!important}
  @page{size:A4;margin:1.5cm}
}
</style>
</head>
<body>

<div class="screen active" id="intro">
  <div class="ib">
    <div class="ii">📚</div>
    <div style="text-align:center">
      <div class="it">학습습관 검사</div>
      <div class="is">내 공부 습관의 강점과 약점을 발견해요!<br>솔직하고 정확하게 응답해 주세요.</div>
    </div>
    <div class="ic">
      <div><label>학교 이름</label><input type="text" id="inp-school" placeholder="예) 양구대담중학교"></div>
      <div><label>학년 / 반</label><input type="text" id="inp-grade" placeholder="예) 2학년 3반"></div>
      <div><label>이름</label><input type="text" id="inp-name" placeholder="이름을 입력하세요"></div>
      <button class="sb" onclick="startSurvey()">검사 시작하기 →</button>
    </div>
    <div class="qc">총 36문항 · 약 5~7분 소요</div>
  </div>
</div>

<div class="screen" id="survey">
  <div class="sh">
    <div class="sm">
      <span class="cb" id="cat-badge"></span>
      <span class="pn" id="prog-num">0 / 36</span>
    </div>
    <div class="pt"><div class="pf" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="ss" id="survey-scroll"></div>
  <div class="sf">
    <button class="nb pvb" onclick="prevCat()" id="prev-btn" style="display:none">← 이전</button>
    <button class="nb nxb" onclick="nextCat()" id="next-btn">다음 →</button>
  </div>
</div>

<div class="screen" id="results">
  <div class="rh">
    <div class="rn" id="r-name"></div>
    <div class="ri" id="r-info"></div>
    <div class="rl" id="r-level"></div>
    <div class="tc">
      <div><span class="tn" id="r-total">0</span><span class="td">/180</span></div>
      <div class="tr2">
        <div class="tl">전체 학습습관 점수</div>
        <div class="tt"><div class="tf" id="total-fill" style="width:0%"></div></div>
        <div class="tp" id="r-pct"></div>
      </div>
    </div>
  </div>
  <div class="rb" id="result-body"></div>
  <div class="ra">
    <button class="abt dl-btn" onclick="downloadResult()">📄 결과지 보기 / PDF 저장</button>
    <button class="abt" id="save-result-btn" onclick="saveResult()" style="background:linear-gradient(135deg,#059669,#10b981);color:#fff">☁️ 결과 저장하기 (관리자 전송)</button>
    <button class="abt print-btn2" onclick="window.print()">🖨️ 인쇄 / PDF 저장</button>
    <button class="abt retry-btn2" onclick="restartSurvey()">↺ 처음부터 다시 하기</button>
  </div>
</div>

<div id="toast"></div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbxAd1U8lZvT9acbE-xZsyv7jOIlfokjzMa59HpWJ7oiOlXcrXKD20rPoP79pAhgDK-wZQ/exec';

const CATS=[
  {id:'motivation',name:'학습 동기 및 적극성',icon:'🔥',color:'#4F46E5',qs:[1,2,3,4,5,6,7,8],max:40,
   levels:[{min:32,label:'잘함'},{min:24,label:'양호'},{min:16,label:'부족'},{min:0,label:'매우부족'}],
   causes:'공부에 대한 관심과 노력 부족 / 장래 목표 없음 / 자신감 없음',
   improve:['공부하는 이유를 종이에 직접 적어 책상에 붙이기','진로 관련 책이나 영상 찾아보며 동기 찾기','달성 가능한 작은 목표부터 세우고 성취감 쌓기']},
  {id:'planning',name:'학습 계획성 및 조직성',icon:'🗓️',color:'#0891B2',qs:[9,10,11,12,13,14,15],max:35,
   levels:[{min:28,label:'잘함'},{min:21,label:'양호'},{min:14,label:'부족'},{min:0,label:'매우부족'}],
   causes:'학습계획 없이 공부함 / 계획한 것을 실천하지 못함 / 좋아하는 과목 위주로만 공부함',
   improve:['매주 일요일에 다음 주 학습 계획표 작성하기','목표량 정해 공부 후 완료하면 체크하기','공부 잘 되는 골든타임 파악해서 집중 활용하기']},
  {id:'concentration',name:'학습 집중력',icon:'🎯',color:'#7C3AED',qs:[16,17,18,19,20,21,22],max:35,
   levels:[{min:28,label:'잘함'},{min:21,label:'양호'},{min:14,label:'부족'},{min:0,label:'매우부족'}],
   causes:'음식·음악을 병행하며 공부함 / 공부방에 방해물이 많음 / 가족·친구로 인해 공부가 자주 끊김',
   improve:['포모도로 기법 적용: 25분 집중 + 5분 휴식','공부 시작 전 스마트폰을 다른 방에 두기','공부 환경 점검: 책상 위 불필요한 물건 치우기']},
  {id:'memory',name:'기억력 향상 방법',icon:'🧠',color:'#B45309',qs:[23,24,25,26,27,28,29],max:35,
   levels:[{min:28,label:'잘함'},{min:21,label:'양호'},{min:14,label:'부족'},{min:0,label:'매우부족'}],
   causes:'기억력에 대한 자신감 부족 / 수업 중 중요 부분 체크 누락 / 노트 필기·메모 기술 부족',
   improve:['수업 중 중요 내용에 형광펜·별표로 즉시 표시하기','배운 내용을 당일 저녁에 5분 요점 정리하기','중요 개념을 소리내어 읽고 자신에게 설명해보기']},
  {id:'strategy',name:'학습 전략 (핵심 파악·요약)',icon:'📝',color:'#059669',qs:[30,31,32,33,34,35,36],max:35,
   levels:[{min:28,label:'잘함'},{min:21,label:'양호'},{min:14,label:'부족'},{min:0,label:'매우부족'}],
   causes:'수업 집중력 부족 / 잡념·안이한 생각 / 핵심 파악·요점 정리 훈련 부족',
   improve:['교과서 읽기 전 제목을 질문으로 바꿔 목적 설정하기','읽은 후 책을 덮고 핵심 3가지 떠올려보는 연습','단원 끝 문제를 미리 풀어보며 학습 방향 잡기']}
];

const Qs=['학습과제가 어려워도 쉽게 포기하지 않는다.','모르는 내용을 학습하는 것을 즐긴다.','노력해서 더 좋은 성적을 받을 수 있었다.','교실을 떠나기 전에 해야 할 숙제와 숙제방법을 확인한다.','공부할 때 빨리 끝내기보다는 완전한 학습정리를 하는 편이다.','계획된 공부를 잘 미루지 않는다.','나에게 좋은 성적은 중요하다.','공부할 때는 정말로 열심히 한다.','공부하기 위해 매일 일정한 시간을 정해 놓는다.','일정한 공부계획표를 가지고 있다.','학습시간이 체계적이어서 시간이 낭비되지 않는다.','매일, 공부에 우선순위를 두고 행동한다.','하루 중 공부가 잘 되는 시간을 안다.','공부하기에 충분한 시간을 만들기 쉽다.','한 과목 공부에 너무 많은 시간을 써서 다른 과목에 지장받는 일은 없다.','공부할 때 전적으로 공부에 집중한다.','과제를 시작하기 전에 얼마나 할지, 언제 끝낼지를 정한다.','공부할 때 집중할 수 있다.','공부하기 위해 대체로 조용한 장소를 찾는다.','공부할 때 잘 졸지 않는다.','공부하고 싶지 않아도 공부한다.','공상이 공부에 방해되는 일은 별로 없다.','정말 싫어서 흥미를 갖기 곤란한 과목은 없다.','매주 각 과목을 복습하기 위한 시간을 정해 놓는다.','한 과목을 공부할 때마다 얼마간의 복습시간을 정한다.','적어도 시험 전에는 노트를 복습한다.','공부한 내용에 대해 많이 기억할 수 있다.','수업 중 설명을 주의 깊게 들어서 기억을 잘한다.','공부내용을 읽기 전 주요 제목과 요약을 미리 검토한다.','책을 읽기 전에 제목을 질문으로 바꾸어 무엇을 배울지 생각한다.','교과서 한 과를 전부 읽으면 참고서 없이도 내용 파악이 잘 된다.','한 과를 다 읽기 전에도 과 끝에 있는 문제를 풀 수 있다.','읽은 후 바로 그 부분을 복습할 시간을 갖는다.','공부내용에 있는 도표·그래프·목록표를 자주 검토한다.','수업 받은 내용에 대해 잘 이야기할 수 있다.','교과서 소단락을 읽은 후 기억할 내용을 정리한다.'];
const OPTS=['전혀 그렇지 않다','그렇지 않다','보통','그렇다','항상 그렇다'];

let ans=new Array(36).fill(0),curCat=0,info={},dateStr='';

// ── FEEDBACK TEMPLATES ─────────────────────────────────────

// ── COMBINED INSIGHT PATTERNS ───────────────────────────────
function getInsight(scores){
  const [m,p,c,mem,s]=scores;
  const lvls=scores.map((sc,i)=>getLevel(CATS[i],sc));
  const insights=[];
  // High motivation + low planning
  if((lvls[0]==='잘함'||lvls[0]==='양호')&&(lvls[1]==='부족'||lvls[1]==='매우부족'))
    insights.push('공부하고 싶은 마음은 충분하지만 계획이 뒷받침되지 않아 에너지가 낭비되고 있습니다. 열정을 체계적인 계획으로 뒷받침해 보세요.');
  // Low motivation + good planning
  if((lvls[0]==='부족'||lvls[0]==='매우부족')&&(lvls[1]==='잘함'||lvls[1]==='양호'))
    insights.push('계획을 세우는 능력은 있지만 실천 의욕이 부족합니다. 공부해야 하는 이유를 다시 한번 스스로에게 물어보세요.');
  // Good concentration but poor memory
  if((lvls[2]==='잘함'||lvls[2]==='양호')&&(lvls[3]==='부족'||lvls[3]==='매우부족'))
    insights.push('집중해서 공부하지만 내용이 기억에 잘 남지 않는 편입니다. 학습 후 즉각적인 복습과 요약이 기억 보유율을 크게 높여줍니다.');
  // Good strategy but poor concentration
  if((lvls[4]==='잘함'||lvls[4]==='양호')&&(lvls[2]==='부족'||lvls[2]==='매우부족'))
    insights.push('학습 방법은 알고 있지만 집중력이 뒷받침되지 않아 효과가 반감되고 있습니다. 짧고 강한 집중 훈련에 집중해 보세요.');
  // All poor
  if(lvls.filter(l=>l==='부족'||l==='매우부족').length>=4)
    insights.push('대부분의 영역에서 개선이 필요합니다. 모든 것을 한꺼번에 바꾸려 하지 말고, 가장 쉽게 바꿀 수 있는 영역 하나를 골라 2주간 집중해 보세요.');
  // All good
  if(lvls.filter(l=>l==='잘함'||l==='양호').length>=4)
    insights.push('전반적으로 균형 잡힌 좋은 학습 습관을 갖추고 있습니다. 현재의 습관을 유지하면서 약한 영역을 조금씩 보완해 나가면 됩니다.');
  return insights;
}

// ── PERSONALIZED ACTION PLAN ─────────────────────────────────
function getActionPlan(scores){
  const lvls=scores.map((sc,i)=>getLevel(CATS[i],sc));
  const actions=[];
  const poors=CATS.filter((_,i)=>lvls[i]==='부족'||lvls[i]==='매우부족');
  // Priority actions based on weakest areas
  if(poors.some(c=>c.id==='motivation'))
    actions.push('오늘 당장 "내가 공부하는 이유 5가지"를 종이에 적어 책상에 붙이기');
  if(poors.some(c=>c.id==='planning'))
    actions.push('이번 주 일요일에 다음 주 7일 학습 계획표 작성하기 (하루 30분~1시간)');
  if(poors.some(c=>c.id==='concentration'))
    actions.push('공부 시작 전 스마트폰을 서랍 또는 다른 방에 두고 25분 집중 타이머 맞추기');
  if(poors.some(c=>c.id==='memory'))
    actions.push('오늘 배운 내용을 자기 전 5분, 형광펜 표시 부분만 다시 읽기');
  if(poors.some(c=>c.id==='strategy'))
    actions.push('내일 수업 전 교과서 해당 단원 제목과 소제목을 3분간 훑어보기');
  // Add general good habits
  if(actions.length<3)
    actions.push('매일 공부한 내용을 노트 한 페이지에 핵심 키워드 3가지로 요약하기');
  if(actions.length<3)
    actions.push('포모도로 기법으로 25분 집중 + 5분 휴식 사이클 하루 4회 실천하기');
  return actions.slice(0,5);
}

// ── LEVEL HELPERS ────────────────────────────────────────────
function getLevel(cat,score){for(const l of cat.levels)if(score>=l.min)return l.label;return '매우부족';}
function lvClass(l){return{잘함:'lx',양호:'lg',부족:'lp',매우부족:'lv'}[l]||'';}
function lvEmoji(l){return{잘함:'🟢',양호:'🔵',부족:'🟡',매우부족:'🔴'}[l]||'';}

// ── SCREEN & SURVEY ──────────────────────────────────────────
function setColor(c){document.documentElement.style.setProperty('--cat',c);}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

function startSurvey(){
  info={school:document.getElementById('inp-school').value.trim()||'학교 미입력',
        grade:document.getElementById('inp-grade').value.trim()||'학년 미입력',
        name:document.getElementById('inp-name').value.trim()||'학생'};
  const now=new Date();
  dateStr=`${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
  curCat=0;ans=new Array(36).fill(0);showScreen('survey');renderCat();
}

function renderCat(){
  const cat=CATS[curCat];setColor(cat.color);
  const badge=document.getElementById('cat-badge');
  badge.textContent=cat.icon+' '+cat.name;badge.style.background=cat.color;
  const done=ans.filter(a=>a>0).length;
  document.getElementById('prog-num').textContent=done+' / 36';
  document.getElementById('prog-fill').style.width=Math.round((done/36)*100)+'%';
  const nb=document.getElementById('next-btn');
  nb.style.background=cat.color;nb.textContent=curCat<CATS.length-1?'다음 →':'결과 보기 🎉';
  document.getElementById('prev-btn').style.display=curCat===0?'none':'block';
  const sc=document.getElementById('survey-scroll');sc.innerHTML='';
  const chip=document.createElement('div');
  chip.style.cssText=`background:${cat.color}18;border:1.5px solid ${cat.color}35;border-radius:12px;padding:10px 13px;display:flex;align-items:center;gap:9px;margin-bottom:2px`;
  chip.innerHTML=`<span style="font-size:22px">${cat.icon}</span><div><div style="font-size:13px;font-weight:700;color:${cat.color}">${cat.name}</div><div style="font-size:10px;color:#64748b;margin-top:1px">문항 ${cat.qs[0]}번 ~ ${cat.qs[cat.qs.length-1]}번 · 총 ${cat.qs.length}문항</div></div>`;
  sc.appendChild(chip);
  cat.qs.forEach(qn=>{
    const qi=qn-1;
    const card=document.createElement('div');
    card.className='qc2'+(ans[qi]>0?' ans':'');
    card.style.setProperty('--cat',cat.color);card.id='qcard-'+qi;
    const btns=OPTS.map((lb,i)=>{const v=i+1,sel=ans[qi]===v;
      return`<button class="lb${sel?' sel':''}" onclick="pick(${qi},${v})" style="${sel?`background:${cat.color};border-color:${cat.color};color:#fff;font-weight:700`:''};--cat:${cat.color}"><span class="rc"><span class="rd"></span></span>${lb}</button>`;
    }).join('');
    card.innerHTML=`<div class="qn">Q${qn}</div><div class="qt">${Qs[qi]}</div><div class="lk">${btns}</div>`;
    sc.appendChild(card);
  });
  sc.scrollTop=0;
}

function pick(qi,v){
  const cat=CATS[curCat];ans[qi]=v;
  const card=document.getElementById('qcard-'+qi);
  card.classList.add('ans');
  card.querySelectorAll('.lb').forEach((b,i)=>{
    const s=i+1===v;b.classList.toggle('sel',s);
    b.style.background=s?cat.color:'';b.style.borderColor=s?cat.color:'';
    b.style.color=s?'#fff':'';b.style.fontWeight=s?'700':'';
  });
  const done=ans.filter(a=>a>0).length;
  document.getElementById('prog-num').textContent=done+' / 36';
  document.getElementById('prog-fill').style.width=Math.round((done/36)*100)+'%';
  const next=CATS[curCat].qs.find(q=>ans[q-1]===0);
  if(next){const nc=document.getElementById('qcard-'+(next-1));if(nc)setTimeout(()=>nc.scrollIntoView({behavior:'smooth',block:'center'}),120);}
}

function nextCat(){
  const cat=CATS[curCat];
  const un=cat.qs.filter(q=>ans[q-1]===0);
  if(un.length){
    const fc=document.getElementById('qcard-'+(un[0]-1));
    if(fc){fc.scrollIntoView({behavior:'smooth',block:'center'});fc.style.borderColor='#ef4444';setTimeout(()=>fc.style.borderColor='',1500);}
    showToast(un.length+'개 문항에 답해주세요!');return;
  }
  if(curCat<CATS.length-1){curCat++;renderCat();}else showResults();
}

function prevCat(){if(curCat>0){curCat--;renderCat();}}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='show';
  clearTimeout(t._t);t._t=setTimeout(()=>t.className='',2200);
}

// ── RESULTS ──────────────────────────────────────────────────
function showResults(){
  showScreen('results');
  document.getElementById('r-name').textContent=info.name+' 학생의 학습습관 검사 결과';
  document.getElementById('r-info').textContent=info.school+' '+info.grade+' · 검사일: '+dateStr;
  const total=ans.reduce((a,b)=>a+b,0),pct=Math.round((total/180)*100);
  const lvl=pct>=79?'우수':pct>=62?'양호':pct>=46?'부족':'매우부족';
  const lvlEmoji={우수:'🌟',양호:'✅',부족:'⚠️',매우부족:'🔴'}[lvl];
  document.getElementById('r-level').textContent=lvlEmoji+' 전체 수준: '+lvl;
  document.getElementById('r-total').textContent=total;
  document.getElementById('r-pct').textContent='상위 '+(100-pct)+'% 수준 (180점 만점 중 '+total+'점)';
  setTimeout(()=>document.getElementById('total-fill').style.width=pct+'%',200);

  const catScores=CATS.map(cat=>cat.qs.reduce((s,q)=>s+ans[q-1],0));
  const body=document.getElementById('result-body');
  body.innerHTML='';

  // ── 1) CATEGORY SCORES ──────────────────────────────────
  CATS.forEach((cat,ci)=>{
    const cs=catScores[ci],cp=Math.round((cs/cat.max)*100),lv=getLevel(cat,cs),poor=lv==='부족'||lv==='매우부족';
    const card=document.createElement('div');card.className='cc';
    card.innerHTML=`<div class="ch">
      <div class="ci" style="background:${cat.color}18">${cat.icon}</div>
      <div style="flex:1"><div class="cn">${cat.name}</div><div class="cr">문항 ${cat.qs[0]}~${cat.qs[cat.qs.length-1]}번 · 만점 ${cat.max}점</div></div>
      <div class="lbdg ${lvClass(lv)}">${lvEmoji(lv)} ${lv}</div>
    </div>
    <div class="csr">
      <div class="cbt"><div class="cbf" id="bar${ci}" style="width:0%;background:${cat.color}"></div></div>
      <div class="cst" style="color:${cat.color}">${cs}<span style="font-size:10px;color:#94a3b8;font-weight:400">/${cat.max}</span></div>
    </div>
    ${poor?`<div class="adv">
      <div class="adv-t">📋 개선 방향</div>
      <div class="cause">💡 원인: ${cat.causes}</div>

    body.appendChild(card);
    setTimeout(()=>{const b=document.getElementById('bar'+ci);if(b)b.style.width=cp+'%';},300+ci*120);
  });

  // ── 2) PERSONALIZED FEEDBACK ────────────────────────────
  const fbCard=document.createElement('div');fbCard.className='fb-wrap';
  const overallFbKey=pct>=79?'excellent':pct>=62?'good':pct>=46?'poor':'veryPoor';
  const overallFbText=FB.overall[overallFbKey](info.name,total);

  // Strengths & weaknesses
  const strengths=CATS.filter((_,i)=>['잘함','양호'].includes(getLevel(CATS[i],catScores[i])));
  const weaknesses=CATS.filter((_,i)=>['부족','매우부족'].includes(getLevel(CATS[i],catScores[i])));

  // Category feedback
  const catFbHtml=CATS.map((cat,i)=>{

  // Strength/weakness tags

      ${weaknesses.length?`<div style="font-size:11px;font-weight:700;color:#64748b;margin-top:8px;margin-bottom:5px">⚠️ 보완 영역</div>

    </div>`;
  body.appendChild(fbCard);

  // ── 3) SUMMARY NOTE ────────────────────────────────────
  const note=document.createElement('div');

}

// ── SAVE RESULT TO SERVER ────────────────────────────────────
function saveResult(){
  const btn = document.getElementById('save-result-btn');
  if(!SCRIPT_URL){
    showToast('저장 URL이 설정되지 않았습니다. 관리자에게 문의하세요.');
    return;
  }
  if(btn.disabled) return;

  const total      = ans.reduce((a,b)=>a+b,0);
  const pct        = Math.round((total/180)*100);
  const lvl        = pct>=79?'우수':pct>=62?'양호':pct>=46?'부족':'매우부족';
  const catScores  = CATS.map(cat=>cat.qs.reduce((s,q)=>s+ans[q-1],0));
  const catLevels  = catScores.map((sc,i)=>getLevel(CATS[i],sc));

  const payload = {
    school    : info.school,
    grade     : info.grade,
    name      : info.name,
    date      : dateStr,
    total     : total,
    pct       : pct,
    level     : lvl,
    catScores : catScores,
    catLevels : catLevels,
    answers   : ans
  };

  btn.disabled = true;
  btn.textContent = '⏳ 저장 중...';
  btn.style.background = '#64748b';

  fetch(SCRIPT_URL, {
    method : 'POST',
    mode   : 'no-cors',          // CORS 우회 (Apps Script 표준 방식)
    headers: {'Content-Type':'text/plain'},
    body   : JSON.stringify(payload)
  })
  .then(()=>{
    btn.textContent = '✅ 저장 완료!';
    btn.style.background = '#15803d';
    showToast('✅ '+info.name+' 학생 결과가 저장되었습니다!');
  })
  .catch(err=>{
    btn.disabled = false;
    btn.textContent = '☁️ 결과 저장하기';
    btn.style.background = 'linear-gradient(135deg,#059669,#10b981)';
    showToast('저장 실패. 인터넷 연결을 확인해 주세요.');
    console.error(err);
  });
}

ans=new Array(36).fill(0);curCat=0;showScreen('intro');}
</script>
